name: smart-shopping-env
description: Smart Shopping Assistant Environment
version: 1.0

entry_point: env:SmartShoppingEnv

tasks:
  - name: basic-shopping
    description: Buy high-rated products within budget
    max_steps: 5

  - name: smart-selection
    description: Avoid bad products and maximize reward
    max_steps: 5

  - name: discount-hunter
    description: Prefer high discount items
    max_steps: 5

grader:
  type: reward
  min_score: 0.0
  max_score: 1.0